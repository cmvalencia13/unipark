spring.application.name=backend

# Datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/unipark
spring.datasource.username=unipark
spring.datasource.password=unipark
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.jpa.hibernate.ddl-auto=validate


# Cambiar el puerto para evitar conflicto con Apache
server.port=8081

# QR HMAC secret (debe coincidir con el secret usado para generar el payload iOS)
app.security.qr-secret=default-secret-key-change-me

# ── Auth0 OIDC ──────────────────────────────────────────────────────────────────
# La barra final es obligatoria para el OIDC discovery de Spring
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://dev-5ndrp8gm0rm3r0mw.us.auth0.com/}
