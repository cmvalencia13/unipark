spring.application.name=backend

# Datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/unipark
spring.datasource.username=unipark
spring.datasource.password=unipark
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway configuration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate


# Cambiar el puerto para evitar conflicto con Apache
server.port=8081
# OAuth2 Resource Server (Keycloak local en puerto 8082)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082/realms/unipark
unipark.security.mock-jwt=false
