spring.application.name=backend

# Datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/unipark_app
spring.datasource.username=unipark
spring.datasource.password=unipark
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway configuration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# Keycloak OIDC
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/unipark
