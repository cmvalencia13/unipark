<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes scan-pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(54, 255, 196, 0.7);
                border-color: rgba(54, 255, 196, 0.8);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 40px rgba(54, 255, 196, 0);
                border-color: rgba(54, 255, 196, 0.1);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(54, 255, 196, 0);
                border-color: rgba(54, 255, 196, 0.8);
            }
        }

        @keyframes scan-line {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        .animate-pulse-ring {
            animation: scan-pulse 2.5s infinite;
        }

        .animate-scan-line {
            animation: scan-line 3s linear infinite;
        }
        
        /* HUD Grid Background */
        .bg-hud-grid {
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }

<style>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col font-sans antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Shared Component -->
<header class="w-full top-0 sticky z-50 bg-surface/70 dark:bg-surface/70 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(0,219,233,0.15)] flex justify-between items-center px-margin-mobile h-16">
<!-- Leading: Avatar -->
<div aria-label="User Profile" class="flex-shrink-0 cursor-pointer active:scale-95 transition-transform duration-200 w-8 h-8 rounded-full bg-surface-container flex items-center justify-center border border-outline/50 overflow-hidden">
<span class="material-symbols-outlined text-primary-fixed-dim text-[18px]" data-icon="person">person</span>
</div>
<!-- Headline / Brand Logo -->
<div class="flex-grow flex justify-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary-fixed-dim tracking-tight m-0">UniPark</h1>
</div>
<!-- Trailing: Icon -->
<div aria-label="notifications" class="flex-shrink-0 cursor-pointer active:scale-95 transition-transform duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Main Canvas: Gate Screen HUD -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile relative overflow-hidden bg-hud-grid pb-24">
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[600px] max-h-[600px] bg-secondary-fixed/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Authorized Context Card (Glassmorphism) -->
<div class="z-10 w-full max-w-sm mb-12 bg-surface-container/40 backdrop-blur-xl border-t border-l border-white/10 rounded-2xl p-md shadow-[0_8px_32px_rgba(0,0,0,0.4)] flex flex-col gap-4">
<div class="flex justify-between items-center w-full">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Destination</span>
<h2 class="font-headline-md text-headline-md text-primary-fixed m-0">Lot C Entry</h2>
</div>
<div class="h-10 w-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant/50">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="directions_car">directions_car</span>
</div>
</div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent my-2"></div>
<div class="flex justify-between items-center w-full">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Authorized Vehicle</span>
<div class="bg-surface border border-outline-variant rounded px-3 py-1 shadow-inner">
<span class="font-mono-data text-mono-data text-on-surface tracking-widest uppercase">XYZ-9876</span>
</div>
</div>
</div>
<!-- Primary Interaction Area: NFC/QR Scanner -->
<div class="relative z-10 flex flex-col items-center justify-center mb-12 cursor-pointer group">
<!-- Concentric Animation Rings -->
<div class="absolute w-[300px] h-[300px] rounded-full border border-secondary-fixed/20 animate-ping" style="animation-duration: 3s;"></div>
<div class="absolute w-[240px] h-[240px] rounded-full border border-secondary-fixed/30 animate-ping" style="animation-duration: 3s; animation-delay: 0.5s;"></div>
<!-- Central Scanner Core -->
<div class="relative w-48 h-48 rounded-full bg-surface-container-high/80 backdrop-blur-2xl flex flex-col items-center justify-center border-2 border-secondary-fixed shadow-[0_0_40px_rgba(54,255,196,0.3)] animate-pulse-ring z-20 overflow-hidden transition-transform duration-300 group-active:scale-95">
<!-- Scanning Laser Line -->
<div class="absolute left-0 w-full h-[2px] bg-secondary-fixed shadow-[0_0_10px_#36ffc4] animate-scan-line z-30"></div>
<!-- Icon Assembly -->
<div class="relative flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-[64px] text-secondary-fixed drop-shadow-[0_0_15px_rgba(54,255,196,0.8)]" data-icon="nfc">nfc</span>
<span class="font-label-md text-label-md text-secondary-fixed font-bold tracking-widest uppercase shadow-black drop-shadow-md">Tap to Enter</span>
</div>
</div>
<p class="mt-8 font-label-sm text-label-sm text-on-surface-variant opacity-80 uppercase tracking-widest flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary-fixed animate-pulse shadow-[0_0_8px_#36ffc4]"></span>
                System Ready
            </p>
</div>

<span class="material-symbols-outlined text-[20px]" data-icon="emergency">emergency</span>

        </button>

<!-- Tab 1: Status (Inactive) -->

</a>

<a class="flex flex-col items-center justify-center bg-secondary-container/20 text-secondary-fixed rounded-xl px-4 py-1 shadow-[0_0_12px_rgba(54,255,196,0.3)] hover:text-secondary-fixed-dim transition-colors active:scale-90 duration-300 w-20 h-16" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="qr_code_scanner" data-weight="fill" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label-sm text-label-sm">Access</span>
</a>
</nav>
<!-- Script for subtle interactive glow tracking (optional enhancement for high-tech feel) -->
<script>
        document.addEventListener('mousemove', function(e) {
            const cursorGlow = document.querySelector('.bg-secondary-fixed\\/5');
            if (cursorGlow) {
                const x = e.clientX;
                const y = e.clientY;
                cursorGlow.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(54, 255, 196, 0.08) 0%, transparent 50%)`;
            }
        });
    </script>
