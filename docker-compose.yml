services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: unipark-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: unipark
      POSTGRES_USER: unipark
      POSTGRES_PASSWORD: unipark
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: unipark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
