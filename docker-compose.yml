services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: unipark-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: unipark
      POSTGRES_USER: unipark
      POSTGRES_PASSWORD: unipark
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7-alpine
    container_name: unipark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# Autenticación: migrada a Auth0 (SaaS gestionado). Ya no se ejecuta Keycloak localmente.
# Config por plataforma en application.properties (backend), OIDCConfig (Android/iOS) y .env (web).

volumes:
  redis_data:

